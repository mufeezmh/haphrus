<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Haphrus – Smart Product Recommendation Platform</title>
    <meta name="description" content="Haphrus helps users discover the best products across multiple platforms with smart recommendations and direct purchase links." />
    <meta name="keywords" content="Haphrus, skincare recommendations, hair care recommendations, AI beauty advisor, personalized beauty, product recommendations, smart recommendations" />
    <meta name="author" content="Haphrus" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://haphrus.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://haphrus.com/" />
    <meta property="og:title" content="Haphrus – Smart Product Recommendation Platform" />
    <meta property="og:description" content="Haphrus helps users discover the best products across multiple platforms with smart recommendations and direct purchase links." />
    <meta property="og:image" content="https://haphrus.com/og-image.png" />
    <meta property="og:site_name" content="Haphrus" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://haphrus.com/" />
    <meta name="twitter:title" content="Haphrus – Smart Product Recommendation Platform" />
    <meta name="twitter:description" content="Haphrus helps users discover the best products across multiple platforms with smart recommendations and direct purchase links." />
    <meta name="twitter:image" content="https://haphrus.com/og-image.png" />

    <!-- Google Search Console Verification (replace with your actual code) -->
    <meta name="google-site-verification" content="YOUR_GOOGLE_VERIFICATION_CODE_HERE" />

    <!-- Structured Data: Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Haphrus",
      "url": "https://haphrus.com",
      "logo": "https://haphrus.com/favicon.svg",
      "description": "Haphrus helps users discover the best products across multiple platforms with smart recommendations and direct purchase links.",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite Schema (enables sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Haphrus",
      "url": "https://haphrus.com",
      "description": "Smart Product Recommendation Platform powered by AI",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://haphrus.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: WebApplication Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Haphrus",
      "url": "https://haphrus.com",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "description": "AI-powered skincare and hair care recommendation platform that analyzes your unique profile and suggests personalized products and routines.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR",
        "description": "Free first recommendation, subscription plans available"
      }
    }
    </script>

    <!-- Performance: Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme Color -->
    <meta name="theme-color" content="#d4729c" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
