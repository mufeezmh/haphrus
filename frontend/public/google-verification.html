<!-- 
  Google Search Console HTML Verification File
  
  HOW TO USE:
  1. Go to https://search.google.com/search-console
  2. Click "Add Property" and enter your website URL
  3. Choose "HTML file" verification method
  4. Google will give you a file like: googleXXXXXXXXXXXX.html
  5. Replace this file's name and content with the one Google provides
  6. Deploy your site and click "Verify" in Search Console
  
  After verification:
  - Go to "Sitemaps" in the left sidebar
  - Submit: https://your-domain.com/sitemap.xml
  - Wait 24-48 hours for Google to start indexing
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Google Search Console Verification</title>
</head>
<body>
  google-site-verification: REPLACE_WITH_YOUR_VERIFICATION_CODE
</body>
</html>
